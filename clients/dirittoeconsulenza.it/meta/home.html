            this.websiteContent = '{\"$schema\":\"../../sitebuilder/v1/schema.json\",\"$schema1\":\"http://localhost:1439/v1/sites/schemas/website/v1\",\"dati\":{\"generale\":{\"titolo\":\"Network\",\"nome\":\"diritto\u0026consulenza\",\"sottotitolo\":\"Network multidisciplinare\",\"descrizione\":\"d\u0026c\",\"descrizioneBreve\":\"Sorto nel 2009 diritto\u0026consulenza rappresenta un network di professionisti costituito con l\u0027obiettivo di garantire servizi legali approfonditi e trasversali, che possano assicurare agli assistiti una tutela completa. Gli ambiti di intervento dei professionisti spaziano nelle principali aree di interesse di soggetti privati e imprese, coprendo i settori del diritto di famiglia e delle successioni, sino alla tutela della proprietà intellettuale, il sovraindebitamento, il risarcimento danni da malpractice medica e il diritto penale. Con diverse sedi in Italia il network è in grado di prestare le proprie attività su tutto il territorio nazionale, forte di una rete professionale solida e con pluriennale esperienza.\",\"descrizioneBreveHTML\":\"\u003cp\u003eSorto nel 2009 \u003cb\u003ediritto\u0026amp;consulenza\u003c/b\u003e rappresenta un network di professionisti costituito con l\u0027obiettivo di garantire \u003cb\u003eservizi legali approfonditi e trasversali\u003c/b\u003e, che possano assicurare agli assistiti una tutela completa.\u003c/p\u003e\u003cp\u003eGli ambiti di intervento dei professionisti spaziano nelle principali aree di interesse di \u003cb\u003esoggetti privati\u003c/b\u003e e \u003cb\u003eimprese\u003c/b\u003e, coprendo i settori del diritto di famiglia e delle successioni, sino alla tutela della proprietà intellettuale, il sovraindebitamento, il risarcimento danni da malpractice medica e il diritto penale.\u003c/p\u003e\u003cp\u003eCon \u003cb\u003ediverse sedi in Italia\u003c/b\u003e il network è in grado di prestare le proprie attività su tutto il territorio nazionale, forte di una rete professionale solida e con pluriennale esperienza.\u003c/p\u003e\",\"mission\":\"Accompagniamo il Cliente in ogni passo, sostenendolo con empatia,\u003cbr\u003erassicurandolo con competenza e operando con esperienza\",\"tema\":{\"caratteri\":{\"Carattere1\":\"Sofia Sans Semi Condensed\",\"Carattere2\":\"Abhaya Libre\"},\"colori\":{\"colore1\":\"#608ba6\",\"colore2\":\"#8e8683\",\"colore3\":\"#c9b5af\",\"colore4\":\"#ffffff\",\"colore5\":\"#9fcfa5\",\"colore6\":\"black\",\"colore7\":\"#ede6e4\",\"colore8\":\"#9f583e\"}}},\"tipiEntita\":[{\"id\":\"competenza\",\"nome\":\"Area di attività\",\"url\":\"/aree-attivita\",\"templateUrlEntita\":\"/{{elemento.nome}}\",\"usaTemplateDiPagina\":\"template-di-pagina-competenza\"},{\"id\":\"persona\",\"nome\":\"Professionista\",\"url\":\"/professionisti\",\"templateUrlEntita\":\"/avvocato-{{elemento.nome}}-{{elemento.cognome}}\",\"usaTemplateDiPagina\":\"template-di-pagina-persona\"},{\"id\":\"articoloweb\",\"nome\":\"articoloweb\",\"url\":\"/news\",\"templateUrlEntita\":\"/{{elemento.dataCreazione.anno}}/{{elemento.dataCreazione.mese}}/{{elemento.dataCreazione.giorno}}/{{elemento.urlRelativo}}\",\"usaTemplateDiPagina\":\"template-di-pagina-news\"}],\"entita\":[{\"c\":\"ENTITA PRODOTTO (SEDI)\",\"tipo\":\"prodotto\",\"id\":\"entita-prodotto-bologna\",\"nome\":\"Bologna\",\"descrizione\":\"+39 051 0037674\",\"testo1\":\"Via San Felice, 123\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/0ef2c6ae-81e3-4f4e-87e9-0d92c2c5bb50/Bologna.webp\",\"descrizione\":\"Sede di Bologna\"}]},{\"tipo\":\"prodotto\",\"id\":\"entita-prodotto-lecce\",\"nome\":\"Lecce\",\"descrizione\":\"+39 0832 1827747\",\"testo3\":\"+39 347 5076342\",\"testo1\":\"Viale Giovanni Paolo II, 11\",\"testo2\":\"via Giovanni Stano, 23\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/48b2d643-2610-49a2-af4c-74fb2872bcca/Lecce.webp\",\"descrizione\":\"Sedi di Lecce\"}]},{\"tipo\":\"prodotto\",\"id\":\"entita-prodotto-milano\",\"nome\":\"Milano\",\"descrizione\":\"+39 02 23177040\",\"testo1\":\"Via Domenichino, 11\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/e255ef3e-9e07-4b74-b2fe-01ee17b04b08/TreTorri-Prearo.jpg\",\"descrizione\":\"Sede di Milano\"}]},{\"c\":\"ENTITA COMPETENZE PRIVATI\",\"tipo\":\"competenza\",\"id\":\"entita-competenza-famiglia-e-successioni\",\"categoria1\":\"1\",\"nome\":\"Diritto di famiglia e Successioni\",\"descrizione\":\"\u003cp\u003eIl network diritto\u0026amp;consulenza garantisce la propria attività nell\u0027ambito del diritto di famiglia e delle successioni, assicurando consulenza in particolare relativamente a: \u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cb\u003eSeparazione consensuale e divorzio congiunto\u003c/b\u003e, anche tramite \u003cb\u003enegoziazione assistita\u003c/b\u003e, al fine di trovare un accordo che disciplini l’affido del figlio nonché ogni aspetto patrimoniale (assegno di mantenimento per il figlio ed eventualmente l’altro coniuge, assegnazione della casa coniugale, scioglimento beni mobili ed immobili, passaggi di proprietà di abitazioni). Nel caso in cui non sia possibile raggiungere l’accordo e si debba affrontare una separazione o un divorzio giudiziale, sarà garantita l’assistenza legale necessaria per affrontare un processo. Durante tutto l’iter processuale sarà possibile trovare un accordo e trasformare la separazione o il divorzio da giudiziale in consensuale.\u003c/li\u003e\u003cli\u003e\u003cb\u003eAffido consensuale di figlio naturale\u003c/b\u003e (ricerca di un accordo in merito all’affido del figlio ed agli aspetti patrimoniali). La formalizzazione dell’accordo tra i genitori potrà essere fatta o con il deposito in Tribunale del Ricorso congiunto o con il deposito dell’Accordo raggiunto a seguito di negoziazione assistita in Procura. In caso di mancato accordo tra i genitori sarà necessario depositare in Tribunale un Ricorso in cui si chiede al Collegio di disciplinare le modalità dell’affido, l’assegno di mantenimento e l’assegnazione della casa familiare.\u003c/li\u003e\u003cli\u003e\u003cb\u003eNomina di un Amministratore di Sostegno:\u003c/b\u003e individualizzazione dei compiti dell’amministratore di sostegno, stesura e deposito del ricorso, assistenza in udienza.\u003c/li\u003e\u003cli\u003e\u003cb\u003eUnioni civili:\u003c/b\u003e ricerca di un accordo in merito ai rapporti patrimoniali degli ex conviventi quali assegno di mantenimento, trasferimento o assegnazione di abitazioni, scioglimento comunione beni mobili ed immobili.\u003c/li\u003e\u003cli\u003e\u003cb\u003eMateria successoria:\u003c/b\u003e esame delle disposizioni testamentarie, individuazione della consistenza dell’asse ereditario, individuazione di eventuali lesioni dei diritti successori, gestione delle trattative per la divisione concordata dei beni ereditari, gestione rapporti con istituti bancari in seguito all’apertura della successione, ecc.). Gestione del contenzioso giudiziale in materia di successioni: divisioni consensuali o giudiziarie, azioni di riduzione, ecc..\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/6f24af60-3dfa-4396-85e7-38c45af18680/Stamerra-esagoni-01.png\",\"descrizione\":\"Diritto di famiglia e Successioni\",\"posizionamentoSuDisposizioneVerticale\":\"center\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-reati-contro-la-persona-e-la-famiglia\",\"categoria1\":\"1\",\"nome\":\"Reati contro la persona e la famiglia\",\"descrizione\":\"\u003cp\u003eIl network garantisce attività di consulenza ed assistenza in materia di \u003cb\u003ediritto penale\u003c/b\u003e, con particolare riferimento ai reati commessi tra ex coniugi o ex conviventi, ovvero più in generale ai reati commessi in \u003cb\u003eambito familiare\u003c/b\u003e, come ad esempio:\u003c/p\u003e\u003cp\u003e\u003cul\u003e\u003cli\u003eatti persecutori (c.d. stalking)\u003c/li\u003e\u003cli\u003emolestie\u003c/li\u003e\u003cli\u003eminacce\u003c/li\u003e\u003cli\u003emaltrattamenti in famiglia\u003c/li\u003e\u003cli\u003eviolazione degli obblighi di mantenimento, di assistenza familiare, ecc...\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\u003cp\u003eL\u0027assistenza è prestata alla \u003cb\u003epersona offesa\u003c/b\u003e sin dalla fase di redazione dell’atto di denuncia/querela e nelle successive fasi del processo penale, a partire dalla costituzione di parte civile.\u003c/p\u003e\u003cp\u003eL\u0027attività difensiva svolta nei confronti della \u003cb\u003epersona indagata\u003c/b\u003e, è offerta sin dalle indagini preliminari e lungo lo svolgimento di tutto il procedimento penale.\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/7989c174-c4a2-4e19-b8a7-ab5bbe4dbad0/Stamerra-esagoni-02.png\",\"descrizione\":\"Reati contro la persona e la famiglia \"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-malasanita-risarcimento-danni\",\"categoria1\":\"1\",\"nome\":\"Malasanità e risarcimento danni\",\"descrizione\":\"\u003cp\u003eI professionisti del network prestano attività di consulenza ed assistenza, sia in fase stragiudiziale che giudiziale, relativamente a questioni afferenti alla in materia della \u003cb\u003eresponsabilità medico-sanitaria\u003c/b\u003e. Sono molteplici i casi trattati e per i quali il network è in grado di garantire la propria tutela:\u003c/p\u003e\u003cp\u003e\u003cul\u003e\u003cli\u003eerrata, omessa o tradiva diagnosi di patologie tumorali o di altre patologie invalidanti;\u003c/li\u003e\u003cli\u003eomessa o tardiva diagnosi di ictus;\u003c/li\u003e\u003cli\u003elesioni colpose provocate al feto dall’errore medico;\u003c/li\u003e\u003cli\u003emorte o lesioni colpose della gestante durante il parto;\u003c/li\u003e\u003cli\u003elesioni permanenti provocate al paziente nel corso dell’operazione chirurgica;\u003c/li\u003e\u003cli\u003elesioni temporanee e permanenti provocate da interventi errati di chirurgia estetica;\u003c/li\u003e\u003cli\u003eerrato inserimento di protesi o impianti dentari;\u003c/li\u003e\u003cli\u003econdotte autolesive del paziente in cura psichiatrica;\u003c/li\u003e\u003cli\u003einfezioni contratte all\u0027interno di un ospedale;\u003c/li\u003e\u003cli\u003emancata somministrazione delle dovute e necessarie cure palliative.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\u003cp\u003eL\u0027assistenza dei professionisti è fornita in tutte le fasi della trattativa e del giudizio riguardanti la richiesta di \u003cb\u003erisarcimento danni\u003c/b\u003e, a partire dalla valutazione preliminare di “fattibilità” eseguita con la collaborazione di un \u003cb\u003emedico legale di fiducia\u003c/b\u003e sino alla causa civile, davanti al Tribunale competente, nei confronti dei medici e della struttura sanitaria responsabili.\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/27a65c78-4224-4bb6-b7e2-2a4b906b9c90/Stamerra-esagoni-03.png\",\"descrizione\":\"Malasanità e risarcimento danni\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-diritto-bancario\",\"categoria1\":\"1\",\"nome\":\"Diritto bancario\",\"descrizione\":\"\u003cp\u003eL\u0027assistenza del network è volta a fornire consulenza nell\u0027ambito del \u003cb\u003ediritto bancario\u003c/b\u003e con particolare riferimento all’individuazione di profili di invalidità di \u003cb\u003econtratti bancari\u003c/b\u003e, ad es:\u003c/p\u003e\u003cp\u003e\u003cul\u003e\u003cli\u003esuperamento del tasso soglia\u003c/li\u003e\u003cli\u003enullità di fideiussioni conformi al modello ABI\u003c/li\u003e\u003c/ul\u003eL\u0027attività dei professionisti è altresì garantita in relazione ai \u003cb\u003econtratti di compravendita di strumenti finanziari (obbligazioni, azioni, gestioni patrimoniali)\u003c/b\u003e oltre che per la formulazione di pareri in ordine ai possibili rimedi da adottare.\u003c/p\u003e\u003cp\u003eIn generale, l\u0027assistenza è fornita nei rapporti con \u003cb\u003eistituti bancari\u003c/b\u003e o \u003cb\u003eintermediari finanziari\u003c/b\u003e e nelle eventuali controversie che coinvolgano questi ultimi.\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/11fd6419-edca-425a-a67c-8db877c672bc/Stamerra-esagoni-04.png\",\"descrizione\":\"Diritto bancario\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-marchi-brevetti-diritto-autore\",\"categoria1\":\"1\",\"nome\":\"Marchi, Brevetti e Diritto d\u0027autore\",\"descrizione\":\"\u003cp\u003eIl network presta assistenza ai soggetti privati in materia di \u003cstrong\u003eMarchi, Brevetti, Disegni Industriali e Diritto d\u0027autore\u003c/strong\u003e - in Italia, in Europa e all\u0027estero - assicurando anche attivit\u0026agrave; di ricerche di anteriorit\u0026agrave; e deposito. \u0026nbsp;\u003c/p\u003e\u003cp\u003eGli Inventori e gli Autori sono supportati nella valorizzazione e tutela del loro lavoro intellettuale e della loro capacit\u0026agrave; artistica, attraverso il deposito delle loro invenzioni e opere presso gli enti competenti, e aiutati a districarsi in una materia molto complessa, in \u003cstrong\u003econtinua evoluzione\u003c/strong\u003e e sempre pi\u0026ugrave; internazionale a causa della diffusione dei contenuti multimediali attraverso Internet e i social.\u0026nbsp;\u003c/p\u003e\u003cp\u003eIn particolare il network garantisce i seguenti servizi:\u003c/p\u003e\u003cp\u003e\u003cul\u003e\u003cli\u003eRicerche di anteriorità; \u003c/li\u003e\u003cli\u003eDeposito di Marchi Brevetti e Opere a livello Nazionale, Europeo e Internazionale; \u003c/li\u003e\u003cli\u003eContratti per licenze, cessioni, edizioni, pubblicazioni e produzioni cinematografiche e discografiche; \u003c/li\u003e\u003cli\u003eAssistenza in controversie veloci di opposizione, annullamento, nullità, liceità, decadenza presso gli uffici dei marchi e Brevetti Nazionali (UIBM); Europei (EPO ed EUIPO) e Internazionali (WIPO, PCT); \u003c/li\u003e\u003cli\u003eAssistenza giudiziale in cause di contraffazione relative a: Marchi, Disegni, Brevetti e plagio di opere del Diritto d’Autore;\u003c/li\u003e\u003cli\u003eDomiciliazioni presso le Corti di Milano, Bari e Bologna.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/6f24af60-3dfa-4396-85e7-38c45af18680/Stamerra-esagoni-01.png\",\"descrizione\":\"Diritto bancario\"}],\"mostraPaginaDedicata\":true},{\"c\":\"ENTITA COMPETENZE IMPRESE\",\"tipo\":\"competenza\",\"id\":\"entita-competenza-crisi-sovraindebitamento\",\"categoria1\":\"2\",\"nome\":\"Crisi d\u0027impresa e sovraindebitamento\",\"descrizione\":\"\u003cp\u003eIl \u003cb\u003esovraindebitamento\u003c/b\u003e riguarda uno stato di \u003cb\u003einsolvenza\u003c/b\u003e che può interessare un consumatore, un professionista, un imprenditore, un\u0027azienda e grazie alla \u003cb\u003elegge n.3/2012\u003c/b\u003e sono stati messi a punto degli strumenti per contrastare suddetto stato di insolvenza e procedere alla ristrutturazione dei debiti.\u003c/p\u003e\u003cp\u003eI professionisti svolgono attivit\u0026agrave; di analisi della situazione debitoria e consulenza al fine di individuare lo strumento idoneo al superamento della crisi d\u0026rsquo;impresa (ad es. concordato preventivo, accordo di risanamento o piano di risanamento attestato) o del sovraindebitamento (ad es. concordato minore o accordo di ristrutturazione dei debiti del consumatore).\u0026nbsp;\u003c/p\u003e\u003cp\u003eL\u0027Assistenza \u0026egrave; fornita, altres\u0026igrave;, nell\u0026rsquo;accesso allo strumento prescelto sino all\u0026rsquo;ottenimento del provvedimento di omologa o nel raggiungimento dell\u0026rsquo;accordo e, in seguito, nell\u0026rsquo;esecuzione degli stessi.\u0026nbsp;\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/6f24af60-3dfa-4396-85e7-38c45af18680/Stamerra-esagoni-01.png\",\"descrizione\":\"Crisi d\u0027impresa e sovraindebitamento\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-proprieta-industriale-e-intellettuale\",\"categoria1\":\"2\",\"nome\":\"Tutela della Proprietà industriale e intellettuale\",\"descrizione\":\"\u003cp\u003eIl network assiste le imprese che investono nell\u0026rsquo;innovazione attraverso la tutela dei loro \u003cstrong\u003eMarchi\u003c/strong\u003e, \u003cstrong\u003eBrevetti\u003c/strong\u003e, \u003cstrong\u003eDisegni Industriali\u003c/strong\u003e e \u003cstrong\u003eDiritto d\u0027autore\u003c/strong\u003e - in \u003cstrong\u003eItalia\u003c/strong\u003e, in \u003cstrong\u003eEuropa\u003c/strong\u003e e \u003cstrong\u003eall\u0027estero\u003c/strong\u003e - garantendo anche ricerche di anteriorit\u0026agrave; e deposito.\u003c/p\u003e\u003cp\u003eGli imprenditori sono supportati nella valorizzazione, \u003cstrong\u003etutela\u003c/strong\u003e e \u003cstrong\u003emantenimento\u003c/strong\u003e della loro propriet\u0026agrave; Industriale e Intellettuale, attraverso il deposito delle loro invenzioni e opere presso gli enti competenti, a valutarla, a difenderla da aziende concorrenti, che vorrebbero imitarla, a valutarla nelle cessioni e licenze.\u0026nbsp;\u003c/p\u003e\u003cp\u003eIn particolare, il network garantisce i seguenti servizi: \u0026nbsp;\u003c/p\u003e\u003cul\u003e\u003cli\u003eDeposito di Marchi Brevetti e Opere a livello Nazionale, Europeo e Internazionale;\u003c/li\u003e\u003cli\u003eRicerche di anteriorit\u0026agrave;\u003c/li\u003e\u003cli\u003eContratti per licenza, cessione, edizione, pubblicazione e produzione cinematografica e discografica;\u003c/li\u003e\u003cli\u003eAssistenza in controversie veloci di opposizione, annullamento, nullit\u0026agrave;, liceit\u0026agrave;, decadenza presso gli uffici dei marchi e Brevetti Nazionali (UIBM) Europei (EPO ed EUIPO) e Internazionali (WIPO, PCT);\u003c/li\u003e\u003cli\u003eAssistenza giudiziale in cause di contraffazione relative a: Marchi, Disegni, Brevetti e plagio di opere del Diritto d\u0026rsquo;Autore;\u003c/li\u003e\u003cli\u003eDomiciliazioni presso le Corti specializzate di Milano, Bari e Bologna.\u003c/li\u003e\u003c/ul\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/7989c174-c4a2-4e19-b8a7-ab5bbe4dbad0/Stamerra-esagoni-02.png\",\"descrizione\":\"Tutela della Proprietà industriale e intellettuale\",\"posizionamentoSuDisposizioneVerticale\":\"center\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-diritto-societario\",\"categoria1\":\"2\",\"nome\":\"Diritto societario\",\"descrizione\":\"\u003cp\u003eNell\u0027ambito del\u0026nbsp;\u003cstrong\u003ediritto societario\u003c/strong\u003e i professionisti del network forniscono attivit\u0026agrave; di consulenza nella compravendita di partecipazioni sociali, di aziende o di rami d\u0026rsquo;azienda, dalla redazione e negoziazione di lettere d\u0026rsquo;intenti o term sheet, alla redazione e negoziazione dei contratti di acquisizione, nonch\u0026eacute; nella redazione dei patti parasociali. \u0026nbsp;\u003c/p\u003e\u003cp\u003eL\u0027Assistenza \u0026egrave; offerta anche nelle \u003cstrong\u003econtroversie\u003c/strong\u003e in materia societaria quali, a titolo d\u0026rsquo;esempio:\u003c/p\u003e\u003cul\u003e\u003cli\u003econtroversie fra soci\u003c/li\u003e\u003cli\u003eimpugnazione di deliberazioni sociali o consiliari\u003c/li\u003e\u003cli\u003eclaim relativi ad acquisizioni di partecipazioni sociali o di aziende\u003c/li\u003e\u003cli\u003eprocedimenti ex art. 2409 c.c.\u003c/li\u003e\u003cli\u003eazioni di responsabilit\u0026agrave; nei confronti di amministratori e sindaci\u003c/li\u003e\u003c/ul\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/27a65c78-4224-4bb6-b7e2-2a4b906b9c90/Stamerra-esagoni-03.png\",\"descrizione\":\"Diritto societario\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-gestione-e-tutela-credito\",\"categoria1\":\"2\",\"nome\":\"Gestione e tutela del credito\",\"descrizione\":\"\u003cp\u003eIl network presta la propria assistenza e consulenza relativamente ad attività di \u003cb\u003egestione e tutela del credito\u003c/b\u003e, rivolta ad imprese operanti in tutta Italia.\u003c/p\u003e\u003cp\u003emediante l\u0026rsquo;avvio di iniziative di recupero \u003cstrong\u003estragiudiziali\u003c/strong\u003e (a partire dall\u0026rsquo;invio di diffide e solleciti periodici, fino alla redazione di accordi e piani di rientro, a cui segue un accurato monitoraggio della puntuale esecuzione delle intese raggiunte) e \u003cstrong\u003egiudiziali\u003c/strong\u003e (gestione di ogni fase del contenzioso), fino ad arrivare alla proposizione di \u003cstrong\u003einiziative esecutive\u003c/strong\u003e (preceduta, se necessario, dall\u0026rsquo;attivit\u0026agrave; di ricerca con modalit\u0026agrave; telematiche di beni utilmente pignorabili ai sensi dell\u0026rsquo;art. 492 bis cpc) e alla gestione dell\u0026rsquo;eventuale \u003cstrong\u003efase concorsuale\u003c/strong\u003e. \u0026nbsp;\u003c/p\u003e\u003cp\u003eL\u0026rsquo;attivit\u0026agrave; viene svolta su tutto il territorio, potendo il network avvalersi di una \u003cstrong\u003econsolidata rete di collaborazioni\u003c/strong\u003e con numerosi legali in tutta Italia. \u0026nbsp;\u003c/p\u003e\u003cp\u003eOgni fase dell\u0026rsquo;attivit\u0026agrave; di recupero \u0026egrave; oggetto di puntuale rendicontazione ai fini della corretta valutazione dei crediti.\u0026nbsp;\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/11fd6419-edca-425a-a67c-8db877c672bc/Stamerra-esagoni-04.png\",\"descrizione\":\"Gestione e tutela del credito\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-diritto-contratti\",\"categoria1\":\"2\",\"nome\":\"Diritto dei contratti\",\"descrizioneBreve\":\"\",\"descrizione\":\"\u003cp\u003eoltre che nella redazione di accordi modificativi di patti gi\u0026agrave; conclusi.\u0026nbsp;\u003c/p\u003e\u003cp\u003eL\u0027attivit\u0026agrave; dei professionisti comprende anche la formulazione di \u003cstrong\u003epareri\u003c/strong\u003e in merito all\u0026rsquo;esecuzione e all\u0026rsquo;interpretazione di contratti d\u0026rsquo;impresa, nonch\u0026eacute; in merito alla risoluzione, all\u0026rsquo;annullamento o alla rescissione degli stessi.\u0026nbsp;\u003c/p\u003e\u003cp\u003eL\u0027assistenza \u0026egrave;, altres\u0026igrave; offerta nelle controversie aventi ad oggetto: l\u0026rsquo;interpretazione, l\u0026rsquo;esecuzione, l\u0026rsquo;inadempimento, la risoluzione, l\u0026rsquo;annullamento o la rescissione di \u003cstrong\u003econtratti d\u0026rsquo;impresa\u003c/strong\u003e.\u0026nbsp;\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/6f24af60-3dfa-4396-85e7-38c45af18680/Stamerra-esagoni-01.png\",\"descrizione\":\"Diritto dei contratti\"}],\"mostraPaginaDedicata\":true},{\"tipo\":\"competenza\",\"id\":\"entita-competenza-locazioni-diritto-immobiliare\",\"categoria1\":\"2\",\"nome\":\"Locazioni e diritto immobiliare\",\"descrizione\":\"\u003cp\u003eIl network offre un accurato servizio di consulenza stragiudiziale in materia di \u003cb\u003econtratti di locazione\u003c/b\u003e e \u003cb\u003ediritto immobiliare\u003c/b\u003e, nonché in materia di contratti di appalto di servizi di \u003cb\u003e\u003ci\u003efacility\u003c/i\u003e\u003c/b\u003e e \u003cb\u003e\u003ci\u003eproperty management\u003c/i\u003e\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eL’assistenza viene, altresì, garantita in ambito giudiziale, con la gestione del \u003cb\u003econtenzioso\u003c/b\u003e ordinario, così come del contenzioso relativo agli sfratti e alle esecuzioni per rilascio, a cui viene contestualmente affiancata l’attività di recupero dei crediti. L’attività è garantita su tutto il territorio nazionale.\u003c/p\u003e\",\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/7989c174-c4a2-4e19-b8a7-ab5bbe4dbad0/Stamerra-esagoni-02.png\",\"descrizione\":\"Locazioni e diritto immobiliare\",\"posizionamentoSuDisposizioneVerticale\":\"center\"}],\"mostraPaginaDedicata\":true},{\"c\":\"ENTITA PERSONE\",\"tipo\":\"persona\",\"id\":\"entita-persona-giovanni-prearo\",\"titolo\":\"Avvocato\",\"titoloBreve\":\"Avv.\",\"nome\":\"Giovanni\",\"cognome\":\"Prearo\",\"testo1\":\"\u003cb\u003eP.Iva:\u003c/b\u003e 02360680231\",\"testo2\":\"\u003cb\u003ePolizza prof.le:\u003c/b\u003e GENERALI - n. 370210936\",\"testo3\":\"\u003cp\u003e\u003cul\u003e\u003cli\u003eDiritto bancario;\u003c/li\u003e\u003cli\u003eCrisi d\u0027impresa e sovraindebitamento;\u003c/li\u003e\u003cli\u003eDiritto societario;\u003c/li\u003e\u003cli\u003eContratti.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"testo5\":\"Via Domenichino, 11 - Milano\",\"biografia\":\"\u003cp\u003eAvvocato civilista, consegue la Laurea in Giurisprudenza presso l\u0027\u003cstrong\u003eUniversit\u0026agrave; Cattolica di Milano\u003c/strong\u003e nel 1997 e, nel 2000, si abilita all\u0027esercizio della professione forense.\u0026nbsp;\u003c/p\u003e\u003cp\u003eNel corso della propria carriera professionale ha collaborato per oltre quindici anni con alcuni \u003cstrong\u003eStudi legali di primo piano\u003c/strong\u003e (italiani ed internazionali) nei settori del diritto commerciale, del diritto bancario e del diritto concorsuale sino a costituire, nel 2017, il proprio Studio.\u0026nbsp;\u003c/p\u003e\u003cp\u003eSvolge la propria attivit\u0026agrave; nei settori del \u003cstrong\u003ediritto bancario e finanziario\u003c/strong\u003e (con particolare esperienza nelle controversie in materia di negoziazione di strumenti finanziari, in materia di tassi usurari e in materia di fideiussioni c.d. \u0026ldquo;modello ABI\u0026rdquo;), del \u003cstrong\u003ediritto societario\u003c/strong\u003e (anche in relazione a trasferimenti di partecipazioni sociali o di aziende e alla redazione di patti parasociali), del diritto della \u003cstrong\u003ecrisi d\u0027impresa e del sovraindebitamento\u003c/strong\u003e, nonch\u0026eacute; del \u003cstrong\u003ediritto dei contratti\u003c/strong\u003e (con particolare attenzione a contratti di distribuzione commerciale e di agenzia).\u0026nbsp;\u0026nbsp;\u003c/p\u003e\u003cp\u003eHa partecipato, in qualit\u0026agrave; di relatore, a svariati \u003cstrong\u003eseminari\u003c/strong\u003e e \u003cstrong\u003ecorsi\u003c/strong\u003e in materia societaria e concorsuale.\u0026nbsp;\u003c/p\u003e\u003cp\u003eLingue straniere: inglese e francese.\u003c/p\u003e\",\"recapiti\":{\"email\":\"giovanni.prearo@avvprearo.it\",\"pec\":\"giovanni.prearo@milano.pecavvocati.it\",\"telefono\":\"+39 02 23177040\",\"socials\":[{\"tipo\":\"linkedin\",\"url\":\"https://it.linkedin.com/in/giovanni-prearo-a972306\"}]},\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/ca132591-ad09-4dc9-8e84-675c80ee7477/Avv-Prearo.webp\",\"descrizione\":\"{{dati.generale.titolo}} {{dati.generale.nome}} {{dati.generale.cognome}}\"}],\"mostraInHomePage\":true,\"mostraPaginaDedicata\":true},{\"tipo\":\"persona\",\"id\":\"entita-persona-valentina-stamerra\",\"titolo\":\"Avvocato\",\"titoloBreve\":\"Avv.\",\"nome\":\"Valentina\",\"cognome\":\"Stamerra\",\"descrizioneBreve\":\"\",\"testo1\":\"\u003cb\u003eP.Iva:\u003c/b\u003e 13383530154\",\"testo2\":\"\u003cb\u003ePolizza prof.le:\u003c/b\u003e Lloyd Insurance Company SA\u003cbr\u003e n. GT0C06497P-LB\",\"testo4\":\"https://www.valentinastamerra.it/\",\"testo3\":\"\u003cp\u003e\u003cul\u003e\u003cli\u003eTutela della Proprietà Industriale e Intellettuale;\u003c/li\u003e\u003cli\u003eTutela del Diritto d\u0027Autore;\u003c/li\u003e\u003cli\u003eContratti;\u003c/li\u003e\u003cli\u003eDiritto societario e delle Imprese.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"biografia\":\"\u003cp\u003eConsegue con lode la Laurea in Giurisprudenza presso l\u0027\u003cb\u003eUniversità Statale di Milano\u003c/b\u003e, nel 2000 si abilita all\u0027esercizio della professione forense, presso la Corte d\u0027Appello di Milano. Si forma lavorando presso due importanti studi milanesi e con la CCIAA di Milano trattando la materia del societario e iniziando ad appassionarsi alla nuova e avvincente materia della \u003cb\u003eProprietà Intellettuale\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eSviluppa quest\u0027ambito del diritto a partire dall\u0027Università, inserendola nel piano di studi, e dal 2005 se ne occupa in modo prevalente, supportando persone e imprese nel \u003cb\u003evalorizzare\u003c/b\u003e la loro Proprietà Intellettuale, nel tutelarla mediante il deposito e la corretta redazione delle rivendicazioni e nel difenderla dalle imitazioni altrui, avanti agli uffici e alle corti specializzate in queste materie. Attualmente lavora in modo indipendente tra Milano e Lecce, dove ha la sua sede. La materia dei \u003cb\u003eMarchi, Brevetti e Diritto d’Autore\u003c/b\u003e rappresenta ormai il focus principale della sua attività che svolge operando con uno \u003cb\u003estaff interdisciplinare\u003c/b\u003e (in cui sono compresi anche un ingegnere e un commercialista) e con una rete di partner in Italia e all’estero, per le estensioni internazionali. È inoltre accreditata come rappresentante presso gli enti: \u003cb\u003eUIBM, EUIPO, EPO\u003c/b\u003e e \u003cb\u003eWIPO\u003c/b\u003e; iscritta al \u003cb\u003eregistro dell’ARTI\u003c/b\u003e (Agenzia Regionale per la Tecnologia e l’Innovazione) ed all’elenco specialeVoucher del \u003cb\u003eConsiglio Nazionale Forense\u003c/b\u003e di professionisti esperti in Marchi e Brevetti.\u003c/p\u003e\u003cp\u003eSvolge la sua formazione seguendo \u003cb\u003ecorsi di alta specializzazione\u003c/b\u003e destinati non solo ad avvocati ma anche a mandatari in Marchi e Brevetti, come quelli del Politecnico di Milano e dell’ARTI, che vantano tra i loro docenti i nomi più importanti di esaminatori internazionali e avvocati specializzati nella proprietà Industriale.\u003c/p\u003e\u003cp\u003eDal 2009 è fondatrice e componente del networkdiritto\u0026amp;consulenza.\u003c/p\u003e\",\"recapiti\":{\"email\":\"valentina.stamerra@dirittoeconsulenza.it\",\"pec\":\"stamerra.valentina@ordavvle.legalmail.it\",\"telefono2\":\"+39 349 2874987\",\"socials\":[{\"tipo\":\"linkedin\",\"url\":\"https://it.linkedin.com/in/valentina-stamerra-a0964121\"}]},\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/9a861138-9e42-448d-8c49-8d087071cf69/Avv-Stamerra.webp\",\"descrizione\":\"{{dati.generale.titolo}} {{dati.generale.nome}} {{dati.generale.cognome}}\"}],\"mostraInHomePage\":true,\"mostraPaginaDedicata\":true},{\"tipo\":\"persona\",\"id\":\"entita-persona-valeria-esposito\",\"titolo\":\"Avvocato\",\"titoloBreve\":\"Avv.\",\"nome\":\"Valeria\",\"cognome\":\"Esposito\",\"descrizioneBreve\":\"\",\"testo1\":\"\u003cb\u003eP.Iva:\u003c/b\u003e 06467400963\",\"testo2\":\"\u003cb\u003ePolizza prof.le:\u003c/b\u003e Aon, n. ICNF000001.102596\",\"testo3\":\"\u003cp\u003e\u003cul\u003e\u003cli\u003eDiritto di famiglia e successioni;\u003c/li\u003e\u003cli\u003eGestione e tutela del credito;\u003c/li\u003e\u003cli\u003eDiritto delle locazioni e immobiliare.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"testo5\":\"Via Domenichino, 11 - Milano\",\"biografia\":\"\u003cp\u003eConsegue nel 1996 con lode la Laurea in Giurisprudenza presso l\u0027\u003cb\u003eUniversità Statale di Milano\u003c/b\u003e, nel 2000 si iscrive all\u0027\u003cb\u003eOrdine degli Avvocati di Milano\u003c/b\u003e e dal 2022 è abilitata al patrocinio innanzi la \u003cb\u003eCorte di Cassazione e Magistrature Superiori\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eDopo alcuni anni di collaborazione e partnership con uno studio milanese, inizia nel 2009 la propria attività indipendente, occupandosi in particolar modo di questioni relative alle \u003cb\u003elocazioni\u003c/b\u003e e al \u003cb\u003ediritto immobiliare\u003c/b\u003e e al \u003cb\u003e\u003ci\u003efacility\u003c/i\u003e\u003c/b\u003e e \u003cb\u003e\u003ci\u003eproperty management\u003c/i\u003e\u003c/b\u003e (per conto, fra l’altro, di primari Fondi di investimento immobiliare), al \u003cb\u003ediritto successorio e di famiglia\u003c/b\u003e (ambito civile), alla gestione del \u003cb\u003erecupero dei crediti\u003c/b\u003e, per conto di varie società operanti nel settore farmaceutico, immobiliare e della sicurezza antincendio. L’assistenza è garantita in tutta Italia, anche grazie a una consolidata rete di collaborazioni con primari studi legali su tutto il territorio.\u003c/p\u003e\u003cp\u003eCollabora altresì con la \u003cb\u003esezione fallimentare\u003c/b\u003e \u003cb\u003edi Milano\u003c/b\u003e quale legale dei fallimenti, ricevendo incarichi stragiudiziali e giudiziali, relativi a questioni societarie (azioni di responsabilità), azioni revocatorie e azioni di recupero dei crediti a favore delle procedure.\u003c/p\u003e\u003cp\u003eL’attività lavorativa è completata da un costante e attento \u003cb\u003eapprofondimento\u003c/b\u003e e \u003cb\u003eaggiornamento professionale\u003c/b\u003e, con particolare riguardo alle problematiche del diritto di famiglia e dei minori, del diritto fallimentare e concorsuale e del diritto societario. Basa l\u0027approccio professionale su un attento \u003cb\u003eascolto\u003c/b\u003e e su un \u003cb\u003edialogo\u003c/b\u003e con il cliente, illustrando dettagliatamente e anticipatamente le varie fasi delle vertenze, oltre che le opportunità e i rischi legati alle possibili iniziative da intraprendere. Possiede ottime \u003cb\u003ecapacità negoziali\u003c/b\u003e e di \u003cb\u003emediazione\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eOggi presta la propria attività presso il network \u003cb\u003ediritto\u0026amp;consulenza\u003c/b\u003e.\u003c/p\u003e\",\"recapiti\":{\"email\":\"v.esposito@avvesposito.it\",\"pec\":\"valeria.esposito@milano.pecavvocati.it\",\"telefono\":\"+39 02 23177040\",\"socials\":[{\"tipo\":\"linkedin\",\"url\":\"https://it.linkedin.com/in/valeria-esposito-b954921a\"}]},\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/44736896-4575-4e40-ad02-37c3ef898b06/Avv-Esposito.webp\",\"descrizione\":\"{{dati.generale.titolo}} {{dati.generale.nome}} {{dati.generale.cognome}}\"}],\"mostraInHomePage\":true,\"mostraPaginaDedicata\":true},{\"tipo\":\"persona\",\"id\":\"entita-persona-beatrice-mannarini\",\"titolo\":\"Avvocato\",\"titoloBreve\":\"Avv.\",\"nome\":\"Beatrice\",\"cognome\":\"Mannarini\",\"descrizioneBreve\":\"\",\"testo1\":\"\u003cb\u003eP.Iva:\u003c/b\u003e 04198490759\",\"testo2\":\"\u003cb\u003ePolizza prof.le:\u003c/b\u003e Lloyd’s Insurance\u003cbr\u003en. GT2C102038P-LB\",\"testo3\":\"\u003cp\u003e\u003cul\u003e\u003cli\u003eDiritto di famiglia e successioni\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"testo4\":\"http://www.beatricemannarini.it/\",\"testo5\":\"Via Giovanni Stano, 23 - Lecce\",\"biografia\":\"\u003cp\u003eConsegue la Laurea in Giurisprudenza presso l\u0027\u003cb\u003eUniversità degli Studi di Lecce \u003c/b\u003ee intraprende una collaborazione con la Cattedra di \u003cb\u003eLegislazione Minorile\u003c/b\u003e del medesimo Ateneo, conseguendo il titolo di Esperto in materia. Svolge degli stage formativi presso istituti di detenzione di Nisida (Na), Airola (Be) e “Fornelli” di Bari\u003cb\u003e, \u003c/b\u003enel 2003 termina un \u003cb\u003eCorso di Alta Formazione Permanente e Ricorrente\u003c/b\u003e in Legislazione Minorile presso l\u0027Università degli Studi di Bari e nel 2005 si abilita all\u0027esercizio della professione forense.\u003c/p\u003e\u003cp\u003eLa professionista garantisce la propria consulenza e assistenza nell\u0027ambito del \u003cb\u003ediritto civile\u003c/b\u003e, con particolare competenza ed esperienza maturate nel \u003cb\u003ediritto di famiglia\u003c/b\u003e, \u003cb\u003eminorile\u003c/b\u003e e delle \u003cb\u003esuccessioni\u003c/b\u003e. Approfondisce costantemente il proprio settore di attività ed ha all\u0027attivo diversi \u003cb\u003eMaster\u003c/b\u003e e \u003cb\u003eCorsi di formazione\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eInsieme all\u0027attività legale la professionista svolge anche quella \u003cb\u003edidattica\u003c/b\u003e, insegnando materie giuridico-sociali presso alcuni Istituti oltre che ad aver collaborato con alcuni enti pubblici in qualità di Esperto.\u003c/p\u003e\u003cp\u003eOpera in maniera indipendente ed è componente del network \u003cb\u003ediritto\u0026amp;consulenza.\u003c/b\u003e\u003c/p\u003e\",\"recapiti\":{\"email\":\"beatrice.mannarini@dirittoeconsulenza.it\",\"pec\":\"mannarini.beatrice@ordavvle.legalmail.it\",\"telefono\":\"+39 347 5076342\",\"socials\":[{\"tipo\":\"linkedin\",\"url\":\"https://it.linkedin.com/in/beatrice-mannarini-b3133725 \"}]},\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/9f12d113-fbb0-4f85-9096-6074337944d8/AvvMannarini_new.webp\",\"descrizione\":\"{{dati.generale.titolo}} {{dati.generale.nome}} {{dati.generale.cognome}}\"}],\"mostraInHomePage\":true,\"mostraPaginaDedicata\":true},{\"tipo\":\"persona\",\"id\":\"entita-persona-alberto-pisanello\",\"titolo\":\"Avvocato\",\"titoloBreve\":\"Avv.\",\"nome\":\"Alberto\",\"cognome\":\"Pisanello\",\"descrizioneBreve\":\"\",\"testo1\":\"\u003cb\u003eP.Iva:\u003c/b\u003e 03509501205\",\"testo2\":\"\u003cb\u003ePolizza prof.le:\u003c/b\u003e UnipolSai Assicurazioni\u003cbr\u003en. 1/59385/122/187589779\",\"testo3\":\"\u003cp\u003e\u003cul\u003e\u003cli\u003eDiritto di famiglia e successioni;\u003c/li\u003e\u003cli\u003eReati contro la persona e la famiglia;\u003c/li\u003e\u003cli\u003eMalasanità e risarcimento danni\u003c/li\u003e\u003cli\u003eTutela della Proprietà Industriale e Intellettuale;\u003c/li\u003e\u003cli\u003eTutela del Diritto d\u0027Autore;\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\",\"testo5\":\"Via San Felice, 123 - Bologna\",\"biografia\":\"\u003cp\u003eConsegue la Laurea in Giurisprudenza nel 2011 presso l’\u003cb \u003eUniversità “Alma Mater Studiorum” di Bologna\u003c/b\u003e e successivamente ottiene il Diploma di Specializzazione presso la \u003cb \u003escuola di diritto “Enrico Redenti”\u003c/b\u003e e l’abilitazione all’esercizio della Professione Forense presso l’\u003cb \u003eOrdine degli Avvocati di Bologna\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eSvolge la sua formazione professionale affiancando i Magistrati nello svolgimento delle loro funzioni presso la \u003cb \u003eProcura Generale di Bologna \u003c/b\u003ee il \u003cb \u003eT.A.R. Emilia Romagna\u003c/b\u003e e collaborando con alcuni noti \u003cb \u003eStudi Legali\u003c/b\u003e del panorama bolognese.\u003c/p\u003e\u003cp\u003eFonda lo Studio di cui è titolare nel capoluogo emiliano ed è membro del network interdisciplinare di \u003cb \u003ed\u003c/b\u003e\u003cb \u003eiritto\u0026amp;consulenza\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eL’Avv. Alberto Pisanello può vantare una competenza specifica ed una proficua esperienza nel campo del \u003cb \u003ediritto di famiglia e dei minori\u003c/b\u003e, settore in cui offre assistenza e consulenza sia per \u003cb \u003ecause civili \u003c/b\u003eche per \u003cb \u003eprocessi penali\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eLa sua attività si rivolge a coniugi, conviventi, genitori, per \u003cb\u003eseparazioni\u003c/b\u003e, \u003cb\u003edivorzi\u003c/b\u003e e cause di \u003cb\u003eaffidamento e mantenimento di minori\u003c/b\u003e, anche in situazioni di difficoltà e conflittualità, nonché in relazione a condotte integranti il carattere dell’\u003cb\u003eillecito penale\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eOpera anche nell’ambito dell’\u003cb\u003eamministrazione di sostegno\u003c/b\u003e,\u003cb\u003e \u003c/b\u003esettore in cui offre assistenza per conseguire la nomina di un amministratore a beneficio di un familiare o per impugnare un provvedimento non gradito. Affianca gli amministratori nello svolgimento delle loro funzioni, in particolare se necessitano di assistenza giudiziale civile e penale.\u003c/p\u003e\u003cp\u003eSi occupa altresì di \u003cb\u003eresponsabilità civile\u003c/b\u003e,\u003cb\u003e \u003c/b\u003econ particolare riguardo alla responsabilità di \u003cb\u003emedici e sanitari\u003c/b\u003e, assistendo le persone danneggiate da episodi di \u003cb\u003emalasanità\u003c/b\u003e per il conseguimento di un adeguato risarcimento.\u003c/p\u003e\u003cp\u003eL’esperienza e la competenza professionale maturata nel tempo l’hanno spinto a praticare il diritto industriale, ambito nel quale offre assistenza e consulenza per la tutela dei titoli di \u003cb\u003eproprietà intellettuale\u003c/b\u003e e del \u003cb\u003ediritto d’autore\u003c/b\u003e.\u003c/p\u003e\u003cp\u003eLa sua attività si basa su una conoscenza approfondita delle materie di competenza e sull\u0027aggiornamento costante che l’Avvocato cura attraverso la formazione professionale continua e la redazione di articoli di approfondimento nelle materie trattate.\u003c/p\u003e\",\"recapiti\":{\"email\":\"avvalbertopisanello@gmail.com\",\"pec\":\"alberto.pisanello@ordineavvocatibopec.it\",\"telefono\":\"+39 051 0037674\",\"socials\":[{\"tipo\":\"linkedin\",\"url\":\"https://it.linkedin.com/in/alberto-pisanello-58892a186\"}]},\"immagini\":[{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/f034cb8c-e8bb-4411-afdd-bc645574400c/Avv-Pisanello.webp\",\"descrizione\":\"{{dati.generale.titolo}} {{dati.gener {{dati.generale.tema.caratteri.Carattere2}}\",\"dimensioneCarattere\":\"15\",\"allineaTesto\":\"centro\",\"maiuscolo\":\"false\",\"grassetto\":\"false\",\"spazioTraLeLettere\":\"1\",\"colore\":\"{{dati.generale.tema.colori.colore2}}\",\"margineInferiore\":\"50\"},\"inserisciDopo\":[{\"icona\":{\"stile\":{\"css\":\"fal fa-search fa-rotate-90\",\"margineSinistro\":\"3\",\"grassetto\":\"false\",\"nascondi\":\"false\"}}}]}}]}}},{\"usaTemplateDiRiga\":\"template-di-riga-hai-bisogno1\"}]},{\"c\":\"PAGINA PRIVACY\u0027\",\"url\":\"/privacy-e-cookie-policy\",\"titolo\":\"Privacy e Cookie policy\",\"descrizione\":\"Privacy e Cookie policy\",\"righe\":[{\"colonne\":[{\"contenuti\":[{\"testo\":{\"tipo\":\"P\",\"testoHTML\":\"\u003cp\u003e\u003cb\u003ePRIVACY POLICY\u003c/b\u003e\u003c/p\u003e\u003cp\u003eNel rispetto di quanto previsto dal \u003cb\u003eReg. UE 2016/679 (Regolamento Europeo per la protezione dei dati personali, di seguito anche GDPR)\u003c/b\u003e Le forniamo le dovute informazioni in ordine al trattamento dei Suoi dati personali. Precisiamo che questa informativa non è da considerarsi valida per altri siti web eventualmente consultabili tramite links presenti sul sito web.\u003c/p\u003e\u003cp\u003e\u003cb\u003eIL TITOLARE DEL TRATTAMENTO\u003c/b\u003e è l’avv. Giovanni Prearo con sede in via Domenichino, 11 - 20149 Milano (MI) - Contatti: giovanni.prearo@avvprearo.it.\u003c/p\u003e\u003cp\u003e\u003cb\u003eDATI PERSONALI OGGETTO DI TRATTAMENTO:\u003c/b\u003e\u003c/p\u003e\u003cp\u003eDati comuni (dati anagrafici, indirizzo e dati di contatto).\u003c/p\u003e\u003cp\u003eI dati di natura personale forniti saranno trattati, nel rispetto delle condizioni di liceità, per le seguenti finalità:\u003c/p\u003e\u003cp\u003e1.   richiesta di contatto, con invio di informazioni da Lei richieste (ivi inclusi i preventivi);\u003c/p\u003e\u003cp\u003e2.    attività informativa per finalità connesse alla fornitura dei servizi e/o della consulenza da Lei richiesti;\u003c/p\u003e\u003cp\u003e3.    compilazione di form di raccolta dati in aree dedicate, ivi compreso l’invio di CV;\u003c/p\u003e\u003cp\u003e4.    registrazione al sito;\u003c/p\u003e\u003cp\u003e5.    attività amministrativo-contabili (per esempio, per l’elaborazione di pagamenti e l’emissione di fattura);\u003c/p\u003e\u003cp\u003e6.    manutenzione del sito web.\u003c/p\u003e\u003cp\u003eLa base giuridica del trattamento è ravvisabile nell’art. 6.1 lett. b) GDPR (adempimento di obblighi contrattuali o pre contrattuali). Con specifico riferimento alle attività amministrativo-contabili, invece, il trattamento è necessario per adempiere un obbligo legale al quale è soggetto il Titolare del trattamento.\u003c/p\u003e\u003cp\u003eInfine, per quanto attiene al origlio della manutenzione tecnica del sito web, la base giuridica deve essere ravvisata nell’interesse legittimo del Titolare (sicurezza, organizzazione e tutela dell’iniziativa economica privata ai sensi dell’art. 41 Cost.).\u003c/p\u003e\u003cp\u003ePer le finalità da n. 1 a n. 4, il conferimento dei dati è facoltativo, ma l’eventuale mancato conferimento comporterebbe l’impossibilità di riscontrare le richieste formulate. Per la finalità n. 5 il conferimento dei dati è obbligatorio, in quanto imposto dalla legge. Per la finalità n. 6 non è richiesto il conferimento di dati ma il trattamento dei medesimi può comunque verificarsi in occasione della manutenzione dei sistemi o del sito web.\u003c/p\u003e\u003cp\u003e\u003cb\u003eSPECIALI CATEGORIE DI DATI PERSONALI\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIl Titolare non consente all’interessato di trasmettere, utilizzando l’apposta sezione del sito web oppure i canali di contatto ivi indicati, dati personali rientranti nel novero delle speciali categorie di dati personali di cui all’art. 9 GDPR, testualmente i “[…] dati idonei a rivelare l’origine razziale o etnica, le opinioni politiche, le convinzioni religiose o filosofiche, o l’appartenenza sindacale, nonché trattare dati genetici, dati biometrici intesi a identificare in modo univoco una persona fisica, dati relativi alla salute o alla vita sessuale o all’orientamento sessuale della persona”.\u003c/p\u003e\u003cp\u003eQualora l’interessato, comunque, procedesse al conferimento di tali dati, dovrà manifestare in calce alla richiesta, il Suo esplicito consenso al trattamento delle speciali categorie di dati personali.\u003c/p\u003e\u003cp\u003eSi precisa che, a fronte della trasmissione di speciali categorie di dati personali, ma in assenza di specifica manifestazione del consenso a trattare tali dati, il Titolare del trattamento - che invita espressamente ad astenersi dalla condivisione di tali informazioni - non potrà essere ritenuto responsabile a nessun titolo, né potrà ricevere contestazioni di sorta, poiché in tal caso il trattamento sarà consentito in quanto avente ad oggetto dati resi manifestamente pubblici dall’interessato, in conformità con l’art. 9, co. 1, lett. e) GDPR.\u003c/p\u003e\u003cp\u003e\u003cb\u003eDESTINATARI O CATEGORIE DI DESTINATARI DEI DATI\u003c/b\u003e\u003c/p\u003e\u003cp\u003eI dati di natura personale forniti saranno comunicati a soggetti che tratteranno tali dati in qualità di Responsabili (art. 28 GDPR) e/o in qualità di persone fisiche che agiscono sotto l’autorità del Titolare e del Responsabile (art. 29 GDPR) o di autonomi Titolari.\u003c/p\u003e\u003cp\u003ePrecisamente, i dati saranno comunicati a:\u003c/p\u003e\u003cp\u003e\u003c/p\u003e\u003cul\u003e\u003cli\u003eliberi professionisti, studi o società nell’ambito di rapporti di assistenza e consulenza;\u003c/li\u003e\u003cli\u003esoggetti che forniscono servizi per la gestione del sistema informativo usato dal Titolare, ivi compresa la posta elettronica, newsletter e gestione siti internet;\u003c/li\u003e\u003cli\u003eautorità competenti per adempimenti di obblighi di leggi e/o di disposizioni di organi pubblici, su richiesta.\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eL’elenco dei Responsabili del trattamento è costantemente aggiornato e disponibile presso il Titolare.\u003c/p\u003e\u003cp\u003e\u003cb\u003ePERIODO DI CONSERVAZIONE DEI DATI O CRITERI PER DETERMINARE IL PERIODO\u003c/b\u003e\u003c/p\u003e\u003cp\u003eIl trattamento sarà svolto in forma automatizzata e manuale, con modalità e strumenti volti a garantire la massima sicurezza e riservatezza, ad opera di soggetti di ciò appositamente incaricati. Nel rispetto di quanto previsto dall’art. 5 co. 1 lett. e) GDPR, i dati personali raccolti verranno conservati in una forma che consenta l’identificazione degli interessati per un arco di tempo non superiore al conseguimento delle finalità per le quali i dati personali sono trattati e, a tal fine, è prevista una verifica annuale.\u003cbr/\u003e\u003cbr/\u003e\u003cb\u003eDIRITTI DEGLI INTERESSATI\u003c/b\u003e\u003c/p\u003e\u003cp\u003eL’interessato potrà far valere i suoi diritti come espressi dal GDPR, rivolgendosi al Titolare, a mezzo email. Nello specifico, ha il diritto, in qualunque momento, di chiedere al Titolare del trattamento l’accesso ai Suoi dati personali (art. 15), la rettifica (art. 16) o la cancellazione (art 17) degli stessi, o la limitazione del trattamento (art 18) o di opporsi al loro trattamento basato sul Qualora il trattamento sia basato sul consenso, lei ha il diritto di revocare il consenso in qualsiasi momento senza pregiudicare la liceità del trattamento basata sul consenso prestato prima della revoca. Lei ha, inoltre, il diritto di proporre reclamo all’Autorità di controllo.\u003c/p\u003e\u003cp\u003e\u003cb\u003eNOTE\u003c/b\u003e\u003c/p\u003e\u003cp\u003e\u003cul\u003e\u003cli\u003eIl trasferimento dei dati in territorio extra Ue non è previsto. Tuttavia, qualora ciò si rendesse necessario, saranno adottate le misure e cautele previste dal GDPR e detto trasferimento avverrà in conformità al medesimo GDPR.\u003c/li\u003e\u003cli\u003eNon sono previsti processi decisionali automatizzati, né attività di profilazione.\u003c/li\u003e\u003cli\u003eRESPONSABILITA’\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eTenuto conto che il Titolare del trattamento noleggia servizi di manutenzione e hosting, si informa che potrebbe accadere che la Società TOUCH SOLUTION SRL (fornitrice di servizi di manutenzione e hosting) venga richiesta dal Titolare di effettuare interventi volti alla risoluzione di problematiche di natura tecnica insorte proprio in relazione al sito web.  In tal caso - e solo con riferimento a questo specifico profilo - Touch Solution potrà in via occasionale e accidentale avere accesso a dati personali che si impegna a non conservare e a non trattenere per effettuare alcun tipo di trattamento. Touch Solution e lo Studio Legale agiranno, in quel caso e solo in quel caso, come con-titolari del trattamento.\u003c/p\u003e\u003cp\u003eQualora si verificasse un incidente di sicurezza o sopraggiungessero istanze degli interessati, le Parti convengono che responsabilità, successivi adempimenti ed oneri restino totalmente a carico dello Studio “Legale come sopra meglio indicato al punto \u0026#34;Titolare del trattamento”.\u003c/p\u003e\",\"stile\":{\"carattere\":\"{{dati.generale.tema.caratteri.Carattere2}}\",\"colore\":\"{{dati.generale.tema.colori.colore2}}\",\"allineaTesto\":\"giustificato\",\"dimensioneCarattere\":\"16\",\"margineSuperioreInferiore\":\"10\"}}}]}]}]},{\"c\":\"PAGINA NEWS\",\"url\":\"/news\",\"titolo\":\"News\",\"descrizione\":\"I professionisti di diritto\u0026consulenza scrivono dei contenuti informativi relativi ai loro ambiti di competenza; in questo modo gli utenti possono rimanere aggiornati su novità giuridiche e normative\",\"immagine\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/d09be8e4-44ea-4c9e-aca8-df3f6a38ed50/screen-d\u0026c.png\",\"righe\":[{\"sfondo\":{\"immagine\":{\"url\":\"https://cdn.avvocato360.it/904fcd52-109d-4964-ab94-6476b3cbceb0/74fbab3b-7695-4dbe-8352-99e6c261b9a9/cover-prearo.webp\",\"alt\":\"{{dati.generale.titolo}}
